<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0e13"/>
      <stop offset="1" stop-color="#090a0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="82%" cy="8%" r="60%">
      <stop offset="0" stop-color="#2ee6a6" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#2ee6a6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2ee6a6"/>
      <stop offset="1" stop-color="#5cc8ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#232734" stroke-width="2"/>

  <!-- shield -->
  <g transform="translate(96,150)">
    <path d="M60 0 6 22v34c0 31 22 54 54 64 32-10 54-33 54-64V22L60 0Z"
          fill="none" stroke="#2ee6a6" stroke-width="6" stroke-linejoin="round"/>
    <path d="M34 60l18 18 36-40" fill="none" stroke="#2ee6a6"
          stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="232" y="196" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="56" font-weight="800" fill="#e8ecf4" letter-spacing="-1">Warden</text>
  <text x="234" y="236" font-family="ui-monospace, Consolas, monospace" font-size="22" fill="#717a8c">the run-trust layer for agent skills</text>

  <text x="96" y="356" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="58" font-weight="800" fill="#e8ecf4" letter-spacing="-1.5">The trusted skill brain</text>
  <text x="96" y="424" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="58" font-weight="800" letter-spacing="-1.5" fill="url(#grad)">for open agents.</text>

  <text x="96" y="486" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="26" fill="#aab2c5">Signed · scanned · sandboxed · trust-scored — local-first.</text>

  <!-- trust badges row -->
  <g font-family="ui-monospace, Consolas, monospace" font-size="22" font-weight="700">
    <g transform="translate(96,536)">
      <rect width="196" height="44" rx="9" fill="#0f1f1a" stroke="#1f6b54"/>
      <text x="20" y="29" fill="#2ee6a6">[Warden A/100 ✓]</text>
    </g>
    <g transform="translate(312,536)">
      <rect width="320" height="44" rx="9" fill="#1c1810" stroke="#7a5f1e"/>
      <text x="20" y="29" fill="#ffc24b">[PROVISIONAL C/79 ✓]</text>
    </g>
    <g transform="translate(652,536)">
      <rect width="190" height="44" rx="9" fill="#1f1113" stroke="#7a2a31"/>
      <text x="20" y="29" fill="#ff5d6c">[REJECTED]</text>
    </g>
  </g>

  <!-- wedge stat, right -->
  <g transform="translate(900,150)" text-anchor="middle" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
    <text x="100" y="60" font-size="92" font-weight="800" fill="#e8ecf4">20k</text>
    <text x="100" y="96" font-size="20" fill="#717a8c">places to find skills</text>
    <text x="100" y="150" font-size="34" fill="#717a8c">↓</text>
    <text x="100" y="236" font-size="92" font-weight="800" fill="#ff5d6c">0</text>
    <text x="100" y="272" font-size="20" fill="#717a8c">trustworthy places to run them</text>
  </g>

  <text x="1104" y="600" text-anchor="end" font-family="ui-monospace, Consolas, monospace" font-size="18" fill="#4d5566">a signal, not a guarantee</text>
</svg>
